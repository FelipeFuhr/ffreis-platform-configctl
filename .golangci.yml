run:
  timeout: 5m
  tests: true

linters:
  disable-all: true
  enable:
    # Correctness
    - govet          # go vet (shadowed vars, printf mismatches, etc.)
    - errcheck       # unchecked errors
    - staticcheck    # staticcheck suite (SA*, ST*, QF*, S*)
    - ineffassign    # assignments with no effect
    - unused         # unexported symbols that are never used

    # Style
    - misspell       # common English misspellings

    # Security
    - gosec          # G-code security rules (hardcoded credentials, path traversal, etc.)

    # Bugs
    - bodyclose      # HTTP response body must be closed
    - noctx          # HTTP requests must carry context
    - copyloopvar    # loop variable capture bugs

    # Maintainability
    - godot          # comments must end in a period
    - nolintlint     # nolint directives must be specific and justified

    # Formatting
    - gofmt
    - goimports

linters-settings:
  govet:
    enable:
      - copylocks
  errcheck:
    check-type-assertions: true
    check-blank: false  # `_ = expr` is intentional
  godot:
    scope: declarations
    capital: false
  goimports:
    local-prefixes: github.com/ffreis

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-rules:
    - path: "_test\\.go"
      linters: [errcheck, gosec]
    - path: "vendor/"
      linters: [errcheck, gosec, govet, staticcheck, ineffassign, unused, misspell, bodyclose, noctx, copyloopvar, godot, nolintlint, gofmt, goimports]
