name: CI

# Triggers: every PR and every push to main.
# Job dependency graph:
#
#   secret-scan ─┐
#   fmt ─────────┼─→ lint ─┐
#                └─→ test ──┴─→ container-test ─→ container-build
#
# Any failure blocks all downstream jobs.
# GHCR push only runs on main of the origin repo (not fork PRs).

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.25.8"
  GOLANGCI_LINT_VERSION: "v1.57.2"
  IMAGE: ${{ github.event.repository.name }}

jobs:

  # ── 1. Secret scan ─────────────────────────────────────────────────────────
  # Runs independently — credential leaks block everything else immediately.
  secret-scan:
    name: Secret Scan
    permissions:
      contents: read
      actions: read
      security-events: write
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-gitleaks.yml@5dfbb4986ceb88f6518fa719da3a255294cf03cf
    with:
      working-directory: "."
      scan-history: true
      upload-sarif: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false }}

  fmt:
    name: Format (gofmt)
    permissions:
      contents: read
    uses: FelipeFuhr/ffreis-workflows-go/.github/workflows/go-fmt.yml@d9b0146bb491bf06a79c9c6289034537522cbed3
    with:
      go-version: "1.25.8"
      working-directory: "."

  # ── 3. Vet + Lint ──────────────────────────────────────────────────────────
  lint:
    name: Lint (vet + golangci-lint)
    timeout-minutes: 15
    permissions:
      contents: read
    needs: [fmt]
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@55c2c1448f86e01eaae002a5a3a9624417608d84
        with:
          version: v2.12.1
          install-mode: goinstall
          args: --path-prefix=. --timeout=5m

  # ── 4. Test + Coverage + Vulnerability scan ────────────────────────────────
  test:
    name: Test
    if: ${{ !github.event.pull_request.draft }}
    permissions:
      contents: read
    needs: [fmt]
    uses: FelipeFuhr/ffreis-workflows-go/.github/workflows/go-test.yml@d9b0146bb491bf06a79c9c6289034537522cbed3
    with:
      go-version: "1.25.8"
      working-directory: "."
      test-timeout: "120s"
      run-govulncheck: true
      coverage-artifact-name: "coverage"

  # ── 5. Container test stage ────────────────────────────────────────────────
  # Builds the 'test' Containerfile stage which re-runs tests inside the same
  # base image used in production — catches base-image / runtime divergence.
  container-test:
    name: Container (test stage)
    if: ${{ !github.event.pull_request.draft }}
    timeout-minutes: 30
    permissions:
      contents: read
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Build test stage
        run: |
          docker build \
            --target test \
            --tag ${{ env.IMAGE }}:test-${{ github.sha }} \
            --file Containerfile \
            .

  # ── 6. Container final image ───────────────────────────────────────────────
  container-build:
    name: Container (final + push)
    timeout-minutes: 30
    permissions:
      contents: read
    runs-on: ubuntu-latest
    needs: [container-test]
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Build final image
        run: |
          docker build \
            --target final \
            --tag ${{ env.IMAGE }}:${{ github.sha }} \
            --file Containerfile \
            .

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          image-ref: ${{ env.IMAGE }}:${{ github.sha }}
          format: table
          exit-code: '1'
          severity: HIGH,CRITICAL
